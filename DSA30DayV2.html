        extra: [
          {name:"Boats to Save People",diff:"Medium",slug:"boats-to-save-people"},

      { time:"20 min", label:"Dry Run", icon:"✏️", desc:"Pen-paper trace through" },

    const diffColor = { Easy:"#4ECDC4", Medium:"#F7C948", Hard:"#FF6B35" };
    const STORAGE_KEY = "dsa30_v2";

    // ─────────────────────────────────────────────
    //  APP
    // ─────────────────────────────────────────────
    function App() {
      const [tab, setTab] = useState("plan"); // "plan" | "practice"
      const [activeDay, setActiveDay] = useState(0);
      const [activePrac, setActivePrac] = useState(0);
      const [done, setDone] = useState(() => {
        try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}"); }
        catch { return {}; }
      });
      const [search, setSearch] = useState("");

      useEffect(() => {
        try { localStorage.setItem(STORAGE_KEY, JSON.stringify(done)); } catch {}
      }, [done]);

      const toggle = (key) => setDone(prev => ({ ...prev, [key]: !prev[key] }));

      const dayDone   = (i) => days[i].leetcode.filter((_,j) => done[`d${i}-${j}`]).length;
      const pracDone  = (i) => {
        const pt = practiceTopics[i];
        const prog = pt.programs.filter((_,j) => done[`pp${i}-${j}`]).length;
        const ex   = pt.extra.filter((_,j) => done[`pe${i}-${j}`]).length;
        return prog + ex;
      };
      const pracTotal = (i) => practiceTopics[i].programs.length + practiceTopics[i].extra.length;

      const totalLC   = days.reduce((a,d)=>a+d.leetcode.length,0);
      const totalDone = days.reduce((a,_,i)=>a+dayDone(i),0);
      const overallPct = Math.round((totalDone/totalLC)*100);

      const phases = [...new Set(days.map(d=>d.phase))];

      const pt = practiceTopics[activePrac];

            <div>
              <div style={{fontSize:"9px",letterSpacing:"4px",color:"#444"}}>30-DAY DSA BOOTCAMP</div>
              <div style={{fontSize:"20px",fontWeight:"900",color:"#fff",letterSpacing:"-1px"}}>ARRAYS → TREES</div>
            </div>

            {/* TAB SWITCHER */}
            <div style={{display:"flex",gap:"0"}}>
              {["plan","practice"].map(t => (

                  border:"1px solid #2a2a2a", color: tab===t ? "#000" : "#555",
                  cursor:"pointer", fontFamily:"inherit", fontSize:"11px",
                  letterSpacing:"2px", fontWeight: tab===t ? "700" : "400",

                  padding:"7px 12px",fontSize:"12px",fontFamily:"inherit",
                  outline:"none",width:"180px",

                <div style={{fontSize:"10px",color:"#555"}}>

                  <div style={{height:"100%",width:`${overallPct}%`,background:"#FFD700",transition:"width 0.4s"}}/>
                </div>
              </div>
            </div>
          </div>

              {days.filter(d=>
                d.topic.toLowerCase().includes(search.toLowerCase()) ||
                d.leetcode.some(l=>l.name.toLowerCase().includes(search.toLowerCase()))
              ).map((fd,fi)=>(
                <div key={fi} style={{marginBottom:"16px"}}>
                  <div onClick={()=>{setActiveDay(days.indexOf(fd));setTab("plan");setSearch("");}}

                  {fd.leetcode.filter(l=>l.name.toLowerCase().includes(search.toLowerCase())).map((l,li)=>(

                      {l.name}<span style={{color:diffColor[l.diff],fontSize:"9px"}}>{l.diff}</span>
                    </div>
                  ))}
                </div>
              ))}
              {practiceTopics.filter(pt=>
                pt.topic.toLowerCase().includes(search.toLowerCase()) ||
                pt.programs.some(p=>p.name.toLowerCase().includes(search.toLowerCase())) ||
                pt.extra.some(e=>e.name.toLowerCase().includes(search.toLowerCase()))

                <div key={"p"+fi} style={{marginBottom:"16px"}}>
                  <div onClick={()=>{setActivePrac(practiceTopics.indexOf(fp));setTab("practice");setSearch("");}}

                    [PRACTICE] {fp.topic.toUpperCase()} →
                  </div>
                </div>
              ))}

          )}

            {/* ── SIDEBAR ── */}

                              <div style={{height:"100%",width:`${pct}%`,background:pct===100?"#4CAF50":p.color,transition:"width 0.3s"}}/>

                    <div style={{marginLeft:"auto",textAlign:"right"}}>
                      <span style={{fontSize:"26px",fontWeight:"900",color:d.color}}>{dayDone(activeDay)}</span>

                        return (
                          <div key={i} style={{display:"flex",alignItems:"center",gap:"12px",padding:"11px 14px",background:isDone?"#0c150c":"#0f0f0f",border:`1px solid ${isDone?"#1c301c":"#181818"}`}}>

                          <div style={{fontSize:"10px",color:"#2a2a2a",marginTop:"3px"}}>{s.desc}</div>

                    </div>

                  </div>
                </>
              )}

              {/* ════ PRACTICE TAB ════ */}
              {tab === "practice" && (
                <>
                  {/* Practice Header */}
                  <div style={{display:"flex",alignItems:"center",gap:"14px",marginBottom:"22px"}}>
                    <div style={{width:"48px",height:"48px",border:`2px solid ${pt.color}`,background:pt.color+"15",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"18px",color:pt.color,fontWeight:"900"}}>
                      {pt.icon}
                    </div>
                    <div>
                      <div style={{fontSize:"9px",color:"#444",letterSpacing:"3px"}}>PRACTICE ZONE</div>
                      <div style={{fontSize:"20px",fontWeight:"900",color:"#fff",letterSpacing:"-0.5px"}}>{pt.topic.toUpperCase()}</div>
                    </div>
                    <div style={{marginLeft:"auto",textAlign:"right"}}>
                      <span style={{fontSize:"22px",fontWeight:"900",color:pt.color}}>{pracDone(activePrac)}</span>
                      <span style={{fontSize:"12px",color:"#333"}}>/{pracTotal(activePrac)}</span>
                      <div style={{fontSize:"8px",color:"#333",letterSpacing:"2px"}}>DONE</div>
                    </div>
                  </div>

                  {/* Logic Programs */}
                  <div style={{marginBottom:"24px"}}>
                    <div style={{fontSize:"8px",letterSpacing:"4px",color:"#333",marginBottom:"10px"}}>
                      🔧 LOGIC BUILDING — JAVA PROGRAMS
                    </div>
                    <div style={{display:"flex",flexDirection:"column",gap:"5px"}}>
                      {pt.programs.map((p,i)=>{
                        const key=`pp${activePrac}-${i}`;
                        const isDone=done[key];
                        return (
                          <div key={i} onClick={()=>toggle(key)} style={{
                            display:"flex",alignItems:"flex-start",gap:"12px",
                            padding:"12px 14px",background:isDone?"#0c150c":"#0f0f0f",
                            border:`1px solid ${isDone?"#1c301c":"#181818"}`,cursor:"pointer",
                          }}>
                            <div style={{width:"16px",height:"16px",flexShrink:0,marginTop:"1px",border:`2px solid ${isDone?"#4CAF50":"#2a2a2a"}`,background:isDone?"#4CAF50":"transparent",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"10px",color:"#fff"}}>

                            <div style={{flex:1}}>
                              <div style={{fontSize:"13px",color:isDone?"#444":"#bbb",textDecoration:isDone?"line-through":"none"}}>{p.name}</div>
                              <div style={{fontSize:"11px",color:"#3a3a3a",marginTop:"3px"}}>💡 {p.hint}</div>
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  </div>

                  {/* Extra LC */}
                  <div>
                    <div style={{fontSize:"8px",letterSpacing:"4px",color:"#333",marginBottom:"10px"}}>
                      💻 EXTRA LEETCODE — PATTERN REINFORCEMENT
                    </div>
                    <div style={{display:"flex",flexDirection:"column",gap:"5px"}}>
                      {pt.extra.map((lc,i)=>{
                        const key=`pe${activePrac}-${i}`;
                        const isDone=done[key];
                        return (
                          <div key={i} style={{display:"flex",alignItems:"center",gap:"12px",padding:"11px 14px",background:isDone?"#0c150c":"#0f0f0f",border:`1px solid ${isDone?"#1c301c":"#181818"}`}}>
                            <div onClick={()=>toggle(key)} style={{width:"16px",height:"16px",flexShrink:0,border:`2px solid ${isDone?"#4CAF50":"#2a2a2a"}`,background:isDone?"#4CAF50":"transparent",display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",fontSize:"10px",color:"#fff"}}>
                              {isDone?"✓":""}
                            </div>
                            <div style={{flex:1,fontSize:"13px",color:isDone?"#444":"#bbb",textDecoration:isDone?"line-through":"none"}}>{lc.name}</div>
                            <span style={{fontSize:"8px",fontWeight:"700",color:diffColor[lc.diff],letterSpacing:"1px",minWidth:"44px",textAlign:"right"}}>{lc.diff.toUpperCase()}</span>
                            <a href={`https://leetcode.com/problems/${lc.slug}/`} target="_blank" rel="noopener noreferrer"
                              style={{fontSize:"9px",color:pt.color,padding:"3px 9px",border:`1px solid ${pt.color}33`,letterSpacing:"1px",whiteSpace:"nowrap"}}>
                              OPEN →
                            </a>
                          </div>
                        );
                      })}
                    </div>
                  </div>
                </>
              )}
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
