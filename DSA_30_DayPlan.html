                      }}>
                        {lc.name}
                        <span style={{ color: diffColor[lc.diff], fontSize: "10px" }}>{lc.diff}</span>
                      </div>
                    ))}
                </div>
              ))}
            </div>
          )}

          <div style={{ display: "flex", flex: 1, overflow: "hidden" }}>

            {/* SIDEBAR */}
            <div style={{
              width: "230px", minWidth: "230px", borderRight: "1px solid #141414",
              overflowY: "auto", background: "#090909",
            }}>
              {/* Phase groups */}
              {phases.map(phase => {
                const phaseDays = days.filter(d => d.phase === phase);
                const phaseColor = phaseDays[0].color;
                return (
                  <div key={phase}>
                    <div style={{
                      padding: "10px 16px 4px",
                      fontSize: "9px", letterSpacing: "3px", color: "#333",
                      borderTop: "1px solid #141414",
                    }}>
                      {phase.toUpperCase()}
                    </div>
                    {phaseDays.map(pd => {
                      const idx = days.indexOf(pd);
                      const pct = Math.round((dayDone(idx) / pd.leetcode.length) * 100);
                      const isActive = active === idx;
                      return (
                        <div
                          key={pd.day}
                          onClick={() => setActive(idx)}
                          style={{
                            padding: "10px 16px",
                            cursor: "pointer",
                            borderLeft: isActive ? `3px solid ${pd.color}` : "3px solid transparent",
                            background: isActive ? "#131313" : "transparent",
                            transition: "all 0.1s",
                          }}
                        >
                          <div style={{ display: "flex", alignItems: "center", gap: "8px" }}>
                            <span style={{ color: pd.color, fontSize: "13px", width: "18px", textAlign: "center" }}>
                              {pd.icon}
                            </span>
                            <div style={{ flex: 1, minWidth: 0 }}>
                              <div style={{ fontSize: "9px", color: "#333" }}>DAY {pd.day}</div>
                              <div style={{
                                fontSize: "11px",
                                color: isActive ? "#fff" : "#666",
                                whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis",
                              }}>{pd.topic}</div>
                              <div style={{ marginTop: "4px", height: "2px", background: "#1a1a1a" }}>
                                <div style={{
                                  height: "100%", width: `${pct}%`,
                                  background: pct === 100 ? "#4CAF50" : pd.color,
                                  transition: "width 0.3s",
                                }} />
                              </div>
                            </div>
                            {pct === 100 && (
                              <span style={{ color: "#4CAF50", fontSize: "12px" }}>✓</span>
                            )}
                          </div>
                        </div>
                      );
                    })}
                  </div>
                );
              })}
            </div>

            {/* MAIN PANEL */}
            <div style={{ flex: 1, overflowY: "auto", padding: "28px 32px" }}>

              {/* Day Header */}
              <div style={{ display: "flex", alignItems: "center", gap: "16px", marginBottom: "24px" }}>
                <div style={{
                  width: "52px", height: "52px",
                  border: `2px solid ${d.color}`,
                  background: d.color + "15",
                  display: "flex", alignItems: "center", justifyContent: "center",
                  fontSize: "20px", color: d.color, fontWeight: "900",
                }}>
                  {d.icon}
                </div>
                <div>
                  <div style={{ fontSize: "10px", color: "#444", letterSpacing: "3px" }}>
                    DAY {d.day} OF 30 — {d.phase.toUpperCase()}
                  </div>
                  <div style={{ fontSize: "22px", fontWeight: "900", color: "#fff", letterSpacing: "-0.5px" }}>
                    {d.topic.toUpperCase()}
                  </div>
                </div>
                <div style={{ marginLeft: "auto", textAlign: "right" }}>
                  <div style={{ fontSize: "28px", fontWeight: "900", color: d.color }}>
                    {dayDone(active)}<span style={{ fontSize: "14px", color: "#333" }}>/{d.leetcode.length}</span>
                  </div>
                  <div style={{ fontSize: "9px", color: "#444", letterSpacing: "2px" }}>SOLVED</div>
                </div>
              </div>

              {/* Logic Building */}
              <div style={{ marginBottom: "24px" }}>
                <div style={{ fontSize: "9px", letterSpacing: "4px", color: "#333", marginBottom: "10px" }}>
                  LOGIC BUILDING — PRACTICE FOLDER FIRST
                </div>
                <div style={{ display: "flex", flexWrap: "wrap", gap: "8px" }}>
                  {d.logic.map((l, i) => (
                    <div key={i} style={{
                      padding: "7px 14px",
                      border: `1px solid ${d.color}33`,
                      background: d.color + "08",
                      fontSize: "12px", color: d.color,
                    }}>
                      → {l}
                    </div>
                  ))}
                </div>
              </div>

              {/* LC Problems */}
              <div style={{ marginBottom: "28px" }}>
                <div style={{ fontSize: "9px", letterSpacing: "4px", color: "#333", marginBottom: "10px" }}>
                  LEETCODE PROBLEMS
                </div>
                <div style={{ display: "flex", flexDirection: "column", gap: "6px" }}>
                  {d.leetcode.map((lc, i) => {
                    const key = `${active}-${i}`;
                    const isDone = done[key];
                    return (
                      <div
                        key={i}
                        style={{
                          display: "flex", alignItems: "center", gap: "14px",
                          padding: "12px 16px",
                          background: isDone ? "#0c150c" : "#101010",
                          border: `1px solid ${isDone ? "#1c301c" : "#1a1a1a"}`,
                          transition: "all 0.15s",
                        }}
                      >
                        {/* Checkbox */}
                        <div
                          onClick={() => toggleDone(active, i)}
                          style={{
                            width: "18px", height: "18px", flexShrink: 0,
                            border: `2px solid ${isDone ? "#4CAF50" : "#2a2a2a"}`,
                            background: isDone ? "#4CAF50" : "transparent",
                            display: "flex", alignItems: "center", justifyContent: "center",
                            cursor: "pointer", fontSize: "11px", color: "#fff",
                            transition: "all 0.15s",
                          }}
                        >
                          {isDone ? "✓" : ""}
                        </div>

                        {/* Name */}
                        <div style={{ flex: 1 }}>
                          <span style={{
                            fontSize: "13px",
                            color: isDone ? "#444" : "#bbb",
                            textDecoration: isDone ? "line-through" : "none",
                          }}>
                            {lc.name}
                          </span>
                        </div>

                        {/* Diff */}
                        <span style={{
                          fontSize: "9px", fontWeight: "700",
                          color: diffColor[lc.diff], letterSpacing: "1px", minWidth: "44px", textAlign: "right",
                        }}>
                          {lc.diff.toUpperCase()}
                        </span>

                        {/* Link */}
                        <a
                          href={`https://leetcode.com/problems/${lc.slug}/`}
                          target="_blank"
                          rel="noopener noreferrer"
                          style={{
                            fontSize: "10px", color: d.color,
                            padding: "4px 10px", border: `1px solid ${d.color}33`,
                            letterSpacing: "1px", whiteSpace: "nowrap",
                          }}
                        >
                          OPEN →
                        </a>
                      </div>
                    );
                  })}
                </div>
              </div>

              {/* Daily Schedule */}
              <div style={{ borderTop: "1px solid #151515", paddingTop: "24px" }}>
                <div style={{ fontSize: "9px", letterSpacing: "4px", color: "#333", marginBottom: "14px" }}>
                  DAILY SCHEDULE
                </div>
                <div style={{
                  display: "grid",
                  gridTemplateColumns: "repeat(auto-fit, minmax(160px, 1fr))",
                  gap: "10px",
                }}>
                  {schedule.map((s, i) => (
                    <div key={i} style={{
                      padding: "14px", background: "#0e0e0e", border: "1px solid #181818",
                    }}>
                      <div style={{ fontSize: "18px", marginBottom: "6px" }}>{s.icon}</div>
                      <div style={{ fontSize: "11px", color: d.color, fontWeight: "700", marginBottom: "2px" }}>{s.time}</div>
                      <div style={{ fontSize: "11px", color: "#777" }}>{s.label}</div>
                      <div style={{ fontSize: "10px", color: "#333", marginTop: "3px" }}>{s.desc}</div>
                    </div>
                  ))}
                </div>
              </div>

              {/* Nav buttons */}
              <div style={{ display: "flex", gap: "10px", marginTop: "24px" }}>
                {active > 0 && (
                  <button
                    onClick={() => setActive(active - 1)}
                    style={{
                      padding: "10px 20px", background: "transparent",
                      border: "1px solid #2a2a2a", color: "#666",
                      cursor: "pointer", fontFamily: "inherit", fontSize: "11px", letterSpacing: "2px",
                    }}
                  >
                    ← DAY {active}
                  </button>
                )}
                {active < days.length - 1 && (
                  <button
                    onClick={() => setActive(active + 1)}
                    style={{
                      padding: "10px 20px", background: d.color + "18",
                      border: `1px solid ${d.color}44`, color: d.color,
                      cursor: "pointer", fontFamily: "inherit", fontSize: "11px", letterSpacing: "2px",
                      marginLeft: "auto",
                    }}
                  >
                    DAY {active + 2} →
                  </button>
                )}
              </div>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
